name: Backend CI/CD

# ─────────────────────────────────────────────
# DISPARADORES
# CI  → en todo push o PR a main/master
# CD  → solo en push (merge) a main/master
# ─────────────────────────────────────────────
on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

# Permiso necesario para Workload Identity Federation (OIDC)
permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}          # ID del proyecto en Google Cloud
  REGION: us-east1                                     # Región de Cloud Run (misma que el servicio existente)
  SERVICE_NAME: cinezone-backend                       # Nombre del servicio en Cloud Run
  ARTIFACT_REGISTRY: us-east1-docker.pkg.dev          # Host de Artifact Registry
  REPOSITORY: cinezone-repo                            # Nombre del repositorio en Artifact Registry
  IMAGE: cinezone-backend                              # Nombre de la imagen Docker

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: CI — Compilar y testear
  # Corre en push Y en pull_request
  # ─────────────────────────────────────────────
  build-and-test:
    name: "Build & Test"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout del repositorio"
        uses: actions/checkout@v4

      - name: "Configurar JDK 21 (Temurin)"
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: "Compilar y ejecutar tests con Maven"
        run: mvn -B verify --file pom.xml

  # ─────────────────────────────────────────────
  # JOB 2: CD — Build Docker + Deploy a Cloud Run
  # Solo corre en push a main/master (no en PRs)
  # Depende de que build-and-test pase primero
  # ─────────────────────────────────────────────
  deploy:
    name: "Deploy a Google Cloud Run"
    runs-on: ubuntu-latest
    needs: build-and-test
    # Solo ejecutar en push directo a main/master, nunca en PRs
    if: github.event_name == 'push'

    steps:
      - name: "Checkout del repositorio"
        uses: actions/checkout@v4

      # ── Autenticacion con Google Cloud via OIDC (sin credenciales almacenadas) ──
      - name: "Autenticar en Google Cloud (Workload Identity Federation)"
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          # Formato: projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/POOL/providers/PROVIDER
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          # Formato: github-actions@PROJECT_ID.iam.gserviceaccount.com

      # ── Configurar SDK de Google Cloud ──
      - name: "Configurar Google Cloud SDK"
        uses: google-github-actions/setup-gcloud@v2

      # ── Autenticar Docker con Artifact Registry ──
      - name: "Autenticar Docker con Artifact Registry"
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      # ── Crear repositorio en Artifact Registry si no existe ──
      - name: "Crear repositorio en Artifact Registry (si no existe)"
        run: |
          gcloud artifacts repositories describe ${{ env.REPOSITORY }} \
            --location=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
          || gcloud artifacts repositories create ${{ env.REPOSITORY }} \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --description="Repositorio Docker para CineZone Backend"

      # ── Construir y publicar la imagen Docker ──
      - name: "Build de imagen Docker"
        run: |
          docker build \
            -t ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest \
            .

      - name: "Push de imagen a Artifact Registry"
        run: |
          docker push ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest

      # ── Construir y publicar la imagen de Grafana Alloy ──
      - name: "Build y Push imagen de Grafana Alloy"
        run: |
          docker build \
            -t ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/cinezone-alloy:latest \
            ./alloy
          docker push ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/cinezone-alloy:latest

      # ── Desplegar backend en Cloud Run ──
      - name: "Desplegar backend en Cloud Run"
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}
          env_vars: |
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            CLOUDINARY_URL=${{ secrets.CLOUDINARY_URL }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            MP_ACCESS_TOKEN=${{ secrets.MP_ACCESS_TOKEN }}
            MP_PUBLIC_KEY=${{ secrets.MP_PUBLIC_KEY }}
          flags: |
            --port=8080
            --min-instances=0
            --max-instances=3
            --memory=768Mi
            --cpu=1
            --allow-unauthenticated

      # ── Obtener la URL del backend ya desplegado ──
      - name: "Obtener URL del backend"
        id: backend-url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format="value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT

      # ── Desplegar Grafana Alloy como servicio separado ──
      - name: "Desplegar Grafana Alloy en Cloud Run"
        run: |
          gcloud run deploy cinezone-alloy \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --image=${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/cinezone-alloy:latest \
            --min-instances=1 \
            --max-instances=1 \
            --memory=256Mi \
            --cpu=1 \
            --no-allow-unauthenticated \
            --set-env-vars="BACKEND_URL=${{ steps.backend-url.outputs.url }}" \
            --set-env-vars="GRAFANA_REMOTE_WRITE_URL=${{ secrets.GRAFANA_REMOTE_WRITE_URL }}" \
            --set-env-vars="GRAFANA_USERNAME=${{ secrets.GRAFANA_USERNAME }}" \
            --set-env-vars="GRAFANA_API_TOKEN=${{ secrets.GRAFANA_API_TOKEN }}"
