spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;REFERENTIAL_INTEGRITY=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desactivar Redis para tests usando un mock o perfiles
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Mock Mail
MAIL_USERNAME=test@example.com
MAIL_PASSWORD=testpassword

FRONTEND_URL=http://localhost:3000
JWT_SECRET=supersecretkeyformockjwtwhichislongenoughtobehashablewithhs256andsoonandsoforth
CLOUDINARY_URL=cloudinary://mock
MP_ACCESS_TOKEN=mock_token
MP_PUBLIC_KEY=mock_key
GRAFANA_API_TOKEN=mock_grafana

# Flyway settings
spring.flyway.enabled=false
management.health.redis.enabled=false
spring.data.redis.repositories.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
