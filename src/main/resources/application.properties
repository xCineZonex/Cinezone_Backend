spring.application.name=cinezone
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.fail-on-missing-locations=false

spring.sql.init.mode=never

# Redis Configuration
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

# Cloudinary Configuration
cloudinary.url=${CLOUDINARY_URL}

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

jwt.secret=${JWT_SECRET}
cors.allowed-origins=${FRONTEND_URL}

server.port=${PORT:8080}

# Mercado Pago Configuration
mercadopago.access.token=${MP_ACCESS_TOKEN}
mercadopago.public.key=${MP_PUBLIC_KEY}

# ── Actuator / Métricas para Grafana Cloud (OTLP Push) ──────────────
# Health check para Cloud Run (siempre público)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# OTLP: envía métricas directamente a Grafana Cloud cada 15 segundos
management.otlp.metrics.export.url=https://otlp-gateway-prod-us-east-2.grafana.net/otlp/v1/metrics
management.otlp.metrics.export.headers.authorization=${GRAFANA_OTLP_AUTH}
management.otlp.metrics.export.step=15s

# Etiquetas que identifican este servicio en Grafana
management.metrics.tags.application=cinezone-backend
management.metrics.tags.environment=production

# Métricas habilitadas
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.http.server.requests=true
management.metrics.enable.hikaricp=true
management.metrics.enable.redis=true

# Percentiles de latencia (p50, p95, p99)
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
